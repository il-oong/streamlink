<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StreamLink">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>StreamLink</title>
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="96" cy="96" r="48" stroke="#a855f7" stroke-width="8"/>
            <circle cx="96" cy="96" r="28" stroke="#c084fc" stroke-width="5"/>
            <polygon points="84,78 84,114 120,96" fill="#e9d5ff"/>
          </svg>
          <span>StreamLink</span>
        </div>
        <button class="btn-add" id="btnAdd" aria-label="URL 추가">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 플레이리스트 탭 바 -->
    <div class="playlist-bar" id="playlistBar">
      <div class="playlist-tabs" id="playlistTabs"></div>
      <button class="btn-add-pl" id="btnAddPlaylist" aria-label="플레이리스트 추가">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- 스트림 목록 -->
    <main class="main" id="main">
      <!-- 플레이리스트 제목 헤더 (전체 탭 제외) -->
      <div class="pl-header" id="plHeader" hidden>
        <div class="pl-header-inner">
          <span class="pl-header-title" id="plHeaderTitle"></span>
          <button class="pl-header-edit" id="plHeaderEdit" aria-label="제목 편집">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <span class="pl-header-count" id="plHeaderCount"></span>
      </div>

      <div class="stream-list" id="streamList"></div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState">
        <svg width="56" height="56" viewBox="0 0 192 192" fill="none">
          <circle cx="96" cy="96" r="60" stroke="#4b5563" stroke-width="6" stroke-dasharray="12 8"/>
          <polygon points="82,72 82,120 128,96" fill="#4b5563"/>
        </svg>
        <p>저장된 스트림이 없습니다</p>
        <p class="empty-sub">오른쪽 상단 <strong>+</strong> 버튼으로 URL을 추가하세요</p>
      </div>
    </main>

    <!-- 하단 미니 플레이어 -->
    <div class="mini-player" id="miniPlayer" hidden>
      <div class="mini-player-info">
        <!-- YouTube 재생 중일 때 표시 (백그라운드 재생을 위해 반드시 visible) -->
        <div id="ytPlayerWrap" hidden>
          <div id="ytPlayerEl"></div>
        </div>
        <div class="mini-waveform" id="miniWaveform">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="mini-meta">
          <span class="mini-title" id="miniTitle">—</span>
          <div class="mini-bottom">
            <span class="mini-status" id="miniStatus">재생 중</span>
            <span class="mini-queue" id="miniQueue"></span>
          </div>
        </div>
      </div>
      <div class="mini-controls">
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" aria-label="볼륨">
        <button class="btn-nav-mini" id="btnPrev" aria-label="이전 트랙">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="3" height="16" rx="1"/>
          </svg>
        </button>
        <button class="btn-play-mini" id="btnPlayMini" aria-label="재생/정지">
          <svg class="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
          <svg class="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="btn-nav-mini" id="btnNext" aria-label="다음 트랙">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16" rx="1"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- /#app -->

  <!-- URL 추가 모달 -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">스트림 추가</h2>
        <button class="btn-close" id="btnCloseModal" aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form class="modal-form" id="modalForm">
        <label class="form-label">
          이름 <span class="label-opt">(선택)</span>
          <input type="text" id="inputName" class="form-input" placeholder="예) KBS Cool FM" maxlength="50" autocomplete="off">
        </label>
        <label class="form-label">
          스트림 URL <span class="label-req">*</span>
          <input type="url" id="inputUrl" class="form-input" placeholder="https://stream.example.com/radio.mp3" autocomplete="off" required>
          <span class="form-error" id="urlError"></span>
        </label>
        <label class="form-label">
          플레이리스트
          <select id="selectPlaylist" class="form-input form-select"></select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btnCancel">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 플레이리스트 이름 입력 모달 -->
  <div class="modal-overlay" id="plModalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="plModalTitle">
      <div class="modal-header">
        <h2 id="plModalTitle">플레이리스트 만들기</h2>
        <button class="btn-close" id="btnClosePlModal" aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form class="modal-form" id="plModalForm">
        <label class="form-label">
          이름 <span class="label-req">*</span>
          <input type="text" id="plInput" class="form-input" placeholder="예) 재즈 라디오" maxlength="30" autocomplete="off" required>
          <span class="form-error" id="plError"></span>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btnCancelPl">취소</button>
          <button type="submit" class="btn-primary" id="btnSavePl">저장</button>
        </div>
      </form>
      <!-- 삭제 버튼 (수정 모드에서만 표시) -->
      <button class="btn-pl-delete" id="btnDeletePl" hidden>이 플레이리스트 삭제</button>
    </div>
  </div>

  <!-- PWA 설치 배너 -->
  <div class="pwa-banner" id="pwaBanner" hidden>
    <div class="pwa-banner-text">
      <strong>홈 화면에 추가</strong>
      <span>앱처럼 바로 사용할 수 있어요</span>
    </div>
    <button class="btn-install" id="btnInstall">설치</button>
    <button class="btn-pwa-close" id="btnPwaBannerClose" aria-label="닫기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <!-- YouTube IFrame API (임베드 재생용 — 미니 플레이어 안에서 표시) -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
